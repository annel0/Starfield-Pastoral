name: Bug Report / 问题反馈
description: Report a reproducible crash, bug, broken behavior, or parity issue.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for us to reproduce it.

        感谢反馈问题。请尽量提供可复现步骤、版本信息和截图/日志。

  - type: checkboxes
    id: existing
    attributes:
      label: Existing reports / 是否已搜索
      options:
        - label: I have searched existing issues and discussions.
          required: true

  - type: input
    id: version
    attributes:
      label: Mod version / 模组版本
      description: "Example: 0.4.11"
      placeholder: "0.4.11"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area / 相关系统
      multiple: true
      options:
        - Festival / 节日
        - Fishing / 钓鱼
        - Farming / 农业
        - NPC / 对话与日程
        - UI / 界面
        - Items and blocks / 物品与方块
        - Map and world / 地图与世界
        - Multiplayer / 多人
        - Performance / 性能
        - Translation / 翻译
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: What happened? / 实际发生了什么
      description: Describe the bug, wrong behavior, crash, or vanilla-parity mismatch.
      placeholder: "Example: On Winter 12, after..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望表现
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. Open the game with...
        2. Go to...
        3. Click/use/catch...
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment / 运行环境
      value: |
        - Minecraft:
        - NeoForge:
        - Java:
        - Singleplayer or server:
        - Other mods:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: Drag screenshots or log files here. Paste crash logs if relevant.
      render: shell
    validations:
      required: false
